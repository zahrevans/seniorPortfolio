<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zahr Evans — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <canvas id="three-canvas"></canvas>
    <div id="scroll-driver"><div id="scroll-inner"></div></div>

    <!-- DOM Month Label (replaces broken canvas texture approach) -->
    <div id="month-label">JANUARY</div>

    <!-- INTRO -->
    <div id="intro">
      <div id="intro-name">ZAHR EVANS</div>
      <div id="intro-title">Senior Portfolio</div>
      <div id="intro-sub">Portfolio — 2025</div>
      <div id="intro-buttons">
        <button id="enter-btn" onclick="enterSite()">Enter ↓</button>
        <a id="about-btn" href="aboutme.html">About Me →</a>
      </div>
    </div>

    <!-- UI -->
    <div id="ui">
      <div id="month-counter">01 / 12</div>
      <div id="scroll-label">ZAHR EVANS</div>
      <div id="theme-tag">New Year · Winter</div>
      <div id="scroll-hint">↓ scroll</div>
      <div id="progress"></div>
      <button id="projects-btn" onclick="openProjects()">Show Projects</button>
    </div>

    <!-- NAV DOTS -->
    <div id="nav-dots"></div>

    <!-- PROJECTS OVERLAY -->
    <div id="projects-overlay">
      <div id="overlay-header">JANUARY</div>
      <div id="overlay-subhead">New Year · Winter</div>
      <div id="overlay-projects"></div>
    </div>
    <button id="close-btn" onclick="closeProjects()">✕ Close</button>

    <!-- CURSOR -->
    <div id="cursor"></div>
    <div id="cursor-ring"></div>

    <!-- LIBS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

    <script src="script.js"></script>
  </body>
</html>
